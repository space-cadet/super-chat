<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>super-chat Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 20px; background: #f5f5f5; }
    #root { max-width: 900px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    window.onerror = function(msg, url, line) {
      document.body.innerHTML = '<div style="padding:20px;color:red;font-family:monospace;"><h2>JavaScript Error</h2><p><b>' + msg + '</b></p><p>at line ' + line + '</p><p>in ' + url + '</p></div>';
    };
    window.onunhandledrejection = function(e) {
      document.body.innerHTML = '<div style="padding:20px;color:red;font-family:monospace;"><h2>Unhandled Promise Rejection</h2><p><b>' + e.reason + '</b></p></div>';
    };
  </script>
  <script type="module" src="/main.tsx"></script>
</body>
</html>
